<style>
:root {
  --azul:     #0A1628;
  --azul-med: #1A2E50;
  --azul-cl:  #1E4080;
  --oro:      #C8A84B;
  --rojo:     #C0392B;
  --verde:    #1A6B3C;
  --naranja:  #D35400;
  --violeta:  #6C3483;
  --blanco:   #F5F7FA;
  --gris:     #8A95A3;
  --gris-s:   #DCE2EB;
  --texto:    #1C2733;
  --fondo:    #EEF1F6;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Helvetica Neue',Arial,sans-serif; background:var(--fondo); color:var(--texto); font-size:15px; line-height:1.5; min-height:100vh; }

/* ── HEADER ── */
header { background:var(--azul); color:var(--blanco); padding:12px 16px 0; position:sticky; top:0; z-index:100; border-bottom:3px solid var(--oro); }
.hdr-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.hdr-title h1 { font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--oro); }
.hdr-title p  { font-size:10px; color:var(--gris); }
.search-wrap { position:relative; margin-bottom:10px; }
.search-wrap input { width:100%; padding:9px 12px 9px 34px; border-radius:6px; border:none; background:var(--azul-med); color:var(--blanco); font-size:14px; outline:none; }
.search-wrap input::placeholder { color:var(--gris); }
.search-wrap input:focus { background:var(--azul-cl); }
.s-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--gris); font-size:13px; pointer-events:none; }

/* ── TABS LIBRO I / II ── */
.libro-tabs { display:flex; background:var(--azul-med); border-bottom:2px solid var(--azul-cl); }
.libro-tab { flex:1; padding:9px 0; text-align:center; font-size:12px; font-weight:700; color:var(--gris); cursor:pointer; letter-spacing:.05em; border:none; background:transparent; transition:all .15s; }
.libro-tab.active { color:var(--oro); border-bottom:2px solid var(--oro); background:rgba(200,168,75,.08); }

/* ── FILTROS (solo Libro II) ── */
.filtros { display:flex; gap:6px; padding:8px 16px; overflow-x:auto; background:var(--azul-med); scrollbar-width:none; }
.filtros::-webkit-scrollbar { display:none; }
.filtro-btn { flex-shrink:0; padding:4px 11px; border-radius:20px; border:1px solid var(--gris); background:transparent; color:var(--gris); font-size:11px; cursor:pointer; white-space:nowrap; transition:all .15s; }
.filtro-btn.active { background:var(--oro); border-color:var(--oro); color:var(--azul); font-weight:700; }
.filtro-btn.det { border-color:var(--rojo); color:#e57373; }
.filtro-btn.det.active { background:var(--rojo); border-color:var(--rojo); color:white; }

/* ── NAV Libro I ── */
.nav-l1 { display:flex; gap:6px; padding:8px 16px; overflow-x:auto; background:var(--azul-med); scrollbar-width:none; }
.nav-l1::-webkit-scrollbar { display:none; }
.nav-btn { flex-shrink:0; padding:4px 11px; border-radius:20px; border:1px solid var(--gris); background:transparent; color:var(--gris); font-size:11px; cursor:pointer; white-space:nowrap; transition:all .15s; }
.nav-btn.active { background:var(--oro); border-color:var(--oro); color:var(--azul); font-weight:700; }

/* ── MAIN ── */
main { padding:10px 16px 80px; }
.hidden { display:none !important; }

/* ── SECCIÓN ── */
.titulo-sec { display:flex; align-items:center; gap:8px; margin:16px 0 8px; cursor:pointer; }
.titulo-sec h2 { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--azul-cl); white-space:nowrap; }
.titulo-sec .linea { flex:1; height:1px; background:var(--gris-s); }
.titulo-sec .t-icon { color:var(--gris); font-size:11px; transition:transform .2s; }
.titulo-sec.col .t-icon { transform:rotate(-90deg); }
.grupo-body.col { display:none; }

/* ══ LIBRO II — tarjeta delito ══ */
.delito-card { background:white; border-radius:10px; margin-bottom:7px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; }
.card-header { display:flex; align-items:center; padding:11px 14px; cursor:pointer; gap:10px; }
.badge-det { flex-shrink:0; width:8px; height:8px; border-radius:50%; }
.badge-det.si  { background:var(--rojo); }
.badge-det.no  { background:var(--verde); }
.badge-det.condicional { background:var(--oro); }
.card-nombre { flex:1; font-size:14px; font-weight:600; }
.card-art { font-size:11px; color:var(--gris); white-space:nowrap; }
.card-chevron { color:var(--gris); font-size:11px; transition:transform .2s; }
.delito-card.open .card-chevron { transform:rotate(90deg); }
.pena-pill { display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:4px; margin:0 2px 2px 0; }
.pena-pill.grave  { background:#FDECEA; color:var(--rojo); }
.pena-pill.menos  { background:#FFF8E1; color:#B8860B; }
.pena-pill.leve   { background:#E8F5E9; color:var(--verde); }
.pena-pill.multa  { background:#E3F2FD; color:#1565C0; }
.card-detalle { display:none; padding:0 14px 14px; border-top:1px solid var(--gris-s); }
.delito-card.open .card-detalle { display:block; }
.det-bloque { margin-top:10px; }
.det-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gris); margin-bottom:4px; }
.det-valor { font-size:13px; }
.det-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:700; }
.det-chip.si   { background:#FDECEA; color:var(--rojo); }
.det-chip.no   { background:#E8F5E9; color:var(--verde); }
.det-chip.cond { background:#FFF8E1; color:#B8860B; }
.checklist { list-style:none; margin-top:4px; }
.checklist li { display:flex; align-items:flex-start; gap:7px; font-size:13px; margin-bottom:4px; line-height:1.4; }
.checklist li::before { content:"□"; color:var(--azul-cl); flex-shrink:0; margin-top:1px; }
.nota { margin-top:8px; padding:7px 10px; background:#FFF8E1; border-left:3px solid var(--oro); border-radius:0 6px 6px 0; font-size:12px; color:#7A6000; }
.nota.roja { background:#FDECEA; border-left-color:var(--rojo); color:#7B1E1E; }

/* ══ LIBRO I — tarjeta artículo ══ */
.art-card { background:white; border-radius:10px; margin-bottom:7px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; }
.art-header { display:flex; align-items:center; gap:10px; padding:11px 14px; cursor:pointer; }
.art-num { flex-shrink:0; background:var(--azul); color:var(--oro); font-size:11px; font-weight:700; padding:3px 7px; border-radius:5px; }
.art-titulo { flex:1; font-size:14px; font-weight:600; }
.art-tag { flex-shrink:0; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:700; white-space:nowrap; }
.tag-clave  { background:#FFF3CD; color:#856404; }
.tag-detenc { background:#FDECEA; color:var(--rojo); }
.tag-penas  { background:#E8F5E9; color:var(--verde); }
.tag-nuevo  { background:#EDE7F6; color:var(--violeta); }
.art-chev { color:var(--gris); font-size:11px; transition:transform .2s; }
.art-card.open .art-chev { transform:rotate(90deg); }
.art-detalle { display:none; padding:0 14px 14px; border-top:1px solid var(--gris-s); }
.art-card.open .art-detalle { display:block; }
.d-bloque { margin-top:10px; }
.d-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gris); margin-bottom:4px; }
.d-texto { font-size:13px; color:var(--texto); line-height:1.5; }
.tabla-penas { width:100%; border-collapse:collapse; margin-top:6px; font-size:12px; }
.tabla-penas th { background:var(--azul); color:var(--oro); padding:6px 8px; text-align:left; font-size:11px; }
.tabla-penas td { padding:6px 8px; border-bottom:1px solid var(--gris-s); vertical-align:top; }
.tabla-penas tr:last-child td { border-bottom:none; }
.tabla-penas tr:nth-child(even) td { background:#F8FAFC; }
.check-list { list-style:none; margin-top:4px; }
.check-list li { display:flex; align-items:flex-start; gap:6px; font-size:13px; margin-bottom:5px; line-height:1.4; }
.check-list li::before { content:"▸"; color:var(--azul-cl); flex-shrink:0; margin-top:1px; }
.alerta { margin-top:8px; padding:8px 10px; border-left:3px solid var(--oro); background:#FFF8E1; border-radius:0 6px 6px 0; font-size:12px; color:#7A5C00; line-height:1.5; }
.alerta.roja  { border-left-color:var(--rojo); background:#FDECEA; color:#7B1E1E; }
.alerta.verde { border-left-color:var(--verde); background:#E8F5E9; color:#155724; }

/* ── LEYENDA ── */
.leyenda { position:fixed; bottom:0; left:0; right:0; background:var(--azul); border-top:1px solid var(--azul-med); padding:7px 16px; display:flex; justify-content:center; gap:20px; }
.ley-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--gris); }
.ley-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ── SIN RESULTADOS ── */
.sin-res { text-align:center; padding:40px 20px; color:var(--gris); }

#contador { font-size:11px; color:var(--gris); padding:5px 16px 2px; min-height:18px; }

  <div class="nav-l1 hidden" id="nav-losc"></div>
  <div class="nav-l1 hidden" id="nav-ref"></div>

function penaHtml(p) {
  return `<span class="pena-pill ${p.tipo}">${p.texto}</span>`;
}
function detChipHtml(d) {
  const m = {si:{cls:"si",ico:"🔴",txt:"Procede detención"},no:{cls:"no",ico:"🟢",txt:"No procede detención"},condicional:{cls:"cond",ico:"🟡",txt:"Valorar detención"}};
  const r = m[d]||m.condicional;
  return `<div class="det-chip ${r.cls}">${r.ico} ${r.txt}</div>`;
}
function tablaHtml(filas) {
  const [head,...rows]=filas;
  return `<table class="tabla-penas"><thead><tr>${head.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${String(c).replace(/\n/g,"<br>")}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
}
function listaHtml(items) {
  return `<ul class="check-list">${items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
}
function chipTag(t) {
  const map={clave:"tag-clave",penas:"tag-penas",detenc:"tag-detenc",nuevo:"tag-nuevo"};
  const labels={clave:"CLAVE",penas:"PENAS",detenc:"DETENCIÓN",nuevo:"NUEVO 2026"};
  if(!t)return"";
  return `<span class="art-tag ${map[t]||''}">${labels[t]||t}</span>`;
}

function renderDelitoCard(d) {
  const penas = d.penas.map(penaHtml).join("");
  const elementos = d.elementos.map(e=>`<li>${e}</li>`).join("");
  const notaHtml = d.nota ? `<div class="nota">${d.nota}</div>` : "";
  return `
  <div class="delito-card" id="dc-${d.id}">
    <div class="card-header" onclick="toggle('dc-${d.id}')">
      <div class="badge-det ${d.detencion}"></div>
      <div class="card-nombre">${d.nombre}</div>
      <div class="card-art">${d.articulo}</div>
      <div class="card-chevron">▶</div>
    </div>
    <div class="card-detalle">
      <div class="det-bloque"><div class="det-label">Pena aplicable</div><div class="det-valor">${penas}</div></div>
      <div class="det-bloque"><div class="det-label">Detención</div>${detChipHtml(d.detencion)}</div>
      <div class="det-bloque"><div class="det-label">Elementos del tipo</div><ul class="checklist">${elementos}</ul></div>
      ${notaHtml}
    </div>
  </div>`;
}

function renderLibro2() {
  let lista = DELITOS;
  if (filtroL2 === "detener") lista = lista.filter(d=>d.detencion==="si");
  else if (filtroL2 !== "todos") lista = lista.filter(d=>d.categoria===filtroL2);
  if (busqueda.length>1) {
    const q=busqueda.toLowerCase();
    lista=lista.filter(d=>d.nombre.toLowerCase().includes(q)||d.articulo.toLowerCase().includes(q)||d.seccion.toLowerCase().includes(q)||d.elementos.some(e=>e.toLowerCase().includes(q)));
  }
  const secciones={};
  lista.forEach(d=>{if(!secciones[d.seccion])secciones[d.seccion]=[];secciones[d.seccion].push(d);});
  document.getElementById("contador").textContent=lista.length?`${lista.length} delito${lista.length>1?"s":""} encontrado${lista.length>1?"s":""}`:"";
  if(!lista.length){document.getElementById("contenido").innerHTML=`<div class="sin-res"><div style="font-size:36px">🔍</div><p>Sin resultados</p></div>`;return;}
  let html="";
  for(const sec in secciones){
    const sid=sec.replace(/\s+/g,"_");
    html+=`<div class="titulo-sec" onclick="toggleGrupo('g2-${sid}')"><h2>${sec}</h2><div class="linea"></div><div class="t-icon">▼</div></div><div class="grupo-body" id="g2-${sid}">${secciones[sec].map(renderDelitoCard).join("")}</div>`;
  }
  document.getElementById("contenido").innerHTML=html;
}

function renderArtCard(a, uid) {
  let bloques="";
  for(const c of a.contenido){
    bloques+=`<div class="d-bloque"><div class="d-label">${c.label}</div>`;
    if(c.tabla) bloques+=tablaHtml(c.tabla);
    else if(c.lista) bloques+=listaHtml(c.lista);
    else if(c.texto) bloques+=`<div class="d-texto">${c.texto}</div>`;
    bloques+=`</div>`;
  }
  const alertCls = "alerta"+(a.tipo_alerta?" "+a.tipo_alerta:"");
  const alertHtml = a.alerta?`<div class="${alertCls}">⚠️ ${a.alerta}</div>`:"";
  return `
  <div class="art-card" id="${uid}">
    <div class="art-header" onclick="toggle('${uid}')">
      <div class="art-num">${a.num}</div>
      <div class="art-titulo">${a.nombre}</div>
      ${chipTag(a.tag)}
      <div class="art-chev">▶</div>
    </div>
    <div class="art-detalle">
      <div class="d-bloque"><div class="d-label">Resumen</div><div class="d-texto">${a.resumen}</div></div>
      ${bloques}
      ${alertHtml}
    </div>
  </div>`;
}

function renderLibro1() {
  const nav=document.getElementById("nav-l1");
  // construir nav si está vacío
  if(!nav.dataset.built){
    let btns=`<button class="nav-btn active" onclick="filtrarL1('todos',this)">Todos</button>`;
    LIBRO1.forEach(g=>{ btns+=`<button class="nav-btn" onclick="filtrarL1('${g.id}',this)">${g.titulo.split("—")[0].trim()}</button>`; });
    nav.innerHTML=btns;
    nav.dataset.built="1";
  }

  let totalArts=0; let html=""; let idx=0;
  for(const grupo of LIBRO1){
    if(filtroL1!=="todos"&&filtroL1!==grupo.id){idx+=grupo.arts.length;continue;}
    const artsFilt=grupo.arts.filter(a=>{
      if(!busqueda)return true;
      const q=busqueda.toLowerCase();
      return a.num.toLowerCase().includes(q)||a.nombre.toLowerCase().includes(q)||a.resumen.toLowerCase().includes(q)||
             a.contenido.some(c=>(c.texto||"").toLowerCase().includes(q)||(c.lista||[]).some(l=>l.toLowerCase().includes(q)));
    });
    if(!artsFilt.length){idx+=grupo.arts.length;continue;}
    totalArts+=artsFilt.length;
    html+=`<div class="titulo-sec" onclick="toggleGrupo('g1-${grupo.id}')"><h2>${grupo.titulo}</h2><div class="linea"></div><div class="t-icon">▼</div></div><div class="grupo-body" id="g1-${grupo.id}">${artsFilt.map(a=>renderArtCard(a,`al-${idx++}`)).join("")}</div>`;
  }
  document.getElementById("contador").textContent=totalArts?`${totalArts} artículo${totalArts>1?"s":""}`:""  ;
  document.getElementById("contenido").innerHTML=totalArts?html:`<div class="sin-res"><div style="font-size:36px">🔍</div><p>Sin resultados</p></div>`;
}

function switchLibro(libro) {
  libroActivo=libro;
  document.getElementById("tab-l1").classList.toggle("active",libro==="l1");
  document.getElementById("tab-l2").classList.toggle("active",libro==="l2");
  document.getElementById("tab-lp").classList.toggle("active",libro==="lp");
  document.getElementById("filtros-l2").classList.toggle("hidden",libro!=="l2");
  document.getElementById("nav-l1").classList.toggle("hidden",libro!=="l1");
  document.getElementById("nav-lp").classList.toggle("hidden",libro!=="lp");
  document.getElementById("leyenda-l2").classList.toggle("hidden",libro!=="l2");
  const placeholders={l1:"Buscar artículo, concepto...",l2:"Buscar delito, artículo...",lp:"Buscar LECrim, Habeas Corpus..."};
  document.getElementById("buscador").placeholder=placeholders[libro]||"Buscar...";
  busqueda=""; document.getElementById("buscador").value="";
  renderActivo();
}

function renderActivo(){
  if(libroActivo==="l2") renderLibro2();
  else if(libroActivo==="l1") renderLibro1();
  else renderProcesal();
}

function filtrarL1(tid,btn){
  document.querySelectorAll("#nav-l1 .nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  filtroL1=tid; renderLibro1();
}

function toggle(id){ document.getElementById(id).classList.toggle("open"); }

function toggleGrupo(id){
  const body=document.getElementById(id);
  const hdr=body.previousElementSibling;
  body.classList.toggle("col");
  hdr.classList.toggle("col");
}

// Filtros Libro II
document.querySelectorAll(".filtro-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    filtroL2=btn.dataset.filtro;
    renderLibro2();
  });
});

// Buscador
document.getElementById("buscador").addEventListener("input",e=>{
  busqueda=e.target.value.trim();
  renderActivo();
});

        {label:"¿Qué ocurre si se supera el plazo?",lista:[
          "La detención se convierte en ILEGAL (art. 17 CE)",
          "El detenido puede instar habeas corpus (LO 6/1984)",
          "El agente puede incurrir en delito de detención ilegal del art. 167 CP (funcionario que mantiene privación de libertad fuera de los casos permitidos)",
          "La prueba obtenida durante el exceso de plazo puede ser declarada nula (art. 11 LOPJ)",
        ]},
      ], alerta:"El plazo empieza en el momento de la privación material de libertad, no cuando se firma el atestado. Controla el reloj desde el primer momento.", tipo_alerta:"roja" },

      { num:"Art. 520 bis", nombre:"Prórroga de detención en terrorismo — Hasta 120 horas", tag:"detenc", resumen:"En delitos de terrorismo y crimen organizado relacionado con terrorismo (art. 384 bis LECrim), el plazo ordinario de 72 horas puede prorrogarse hasta 48 horas adicionales con autorización judicial.", contenido:[
        {label:"Supuesto",texto:"Solo aplicable a personas detenidas como presuntos partícipes de delitos del art. 384 bis (terrorismo, banda armada, rebelión con armas). No aplica a cualquier delito grave."},
        {label:"Procedimiento de prórroga",lista:[
          "1. La Policía Judicial solicita la prórroga mediante comunicación MOTIVADA al juez",
          "2. La solicitud debe hacerse dentro de las primeras 48 horas desde la detención",
          "3. El juez autoriza o deniega mediante auto motivado en las 24 horas siguientes a la solicitud",
          "4. Si el juez autoriza: 48 horas adicionales → total máximo 120 horas (5 días)",
          "5. Si el juez deniega: el detenido debe ponerse a disposición judicial en las 72 horas ordinarias",
        ]},
        {label:"Control judicial (ap. 3)",texto:"Durante toda la detención, el juez puede en todo momento requerir información y conocer personalmente o por delegación la situación del detenido."},
        {label:"Incomunicación asociada",texto:"Junto con la prórroga, puede solicitarse la incomunicación del detenido (art. 520 bis.2). El juez resuelve sobre la incomunicación en un plazo de 24 horas. Mientras se tramita la solicitud, el detenido queda automáticamente incomunicado."},
      ], alerta:"La solicitud de prórroga DEBE hacerse antes de que pasen 48 horas. Si se solicita tarde (entre las 48 y las 72 horas), el juez puede rechazarla aunque el plazo no haya vencido aún.", tipo_alerta:"roja" },

      { num:"Arts. 509 y 527", nombre:"Incomunicación del detenido — Régimen general y efectos", tag:"clave", resumen:"La incomunicación es una medida excepcional que solo puede acordar el juez. Restringe derechos concretos del detenido para proteger la investigación.", contenido:[
        {label:"Supuestos habilitantes (art. 509)",lista:[
          "Necesidad urgente de evitar graves consecuencias para la vida, libertad o integridad física de una persona",
          "Necesidad urgente de evitar que se destruyan, oculten o alteren pruebas relevantes",
          "Necesidad de evitar que el detenido actúe contra bienes jurídicos de la víctima",
          "Necesidad de impedir la actuación de cómplices no detenidos aún",
        ]},
        {label:"Quién la acuerda",texto:"SOLO el Juez, mediante auto motivado. La Policía puede SOLICITAR la incomunicación pero nunca acordarla por sí misma. Duración inicial: hasta 5 días. Prorrogable 5 días más en supuestos de terrorismo (art. 509.2)."},
        {label:"Derechos SUSPENDIDOS durante la incomunicación (art. 527)",lista:[
          "Designación de abogado de libre elección (solo abogado de oficio asignado por el turno especial)",
          "Comunicación de la detención a familiares o persona de confianza",
          "Entrevista reservada con el abogado (antes y después de la declaración)",
          "Comunicación telefónica con terceros",
        ]},
        {label:"Derechos que SE MANTIENEN siempre",lista:[
          "Derecho a guardar silencio y a no declarar",
          "Derecho a no confesarse culpable",
          "Reconocimiento médico — pero si está incomunicado: al menos 2 veces cada 24 horas (art. 520.2.h)",
          "Asistencia de intérprete si no habla castellano",
          "Habeas corpus: el detenido incomunicado puede solicitarlo igualmente",
        ]},
        {label:"Diferencia terrorismo / delito ordinario",tabla:[
          ["","Delito ordinario (art. 509)","Terrorismo (art. 520 bis)"],
          ["Quien acuerda","Juez de instrucción","Juez Central de Instrucción (AN)"],
          ["Plazo incomunicación","Hasta 5 días","Hasta 5 + 5 días (10 días)"],
          ["Abogado","Solo de oficio (turno especial)","Solo de oficio (turno especial)"],
          ["Entrevista reservada","Suspendida","Suspendida"],
        ]},
      ], alerta:"La incomunicación NO suspende el habeas corpus ni la presunción de inocencia. El reconocimiento médico forense debe realizarse al menos 2 veces cada 24 horas cuando el detenido está incomunicado.", tipo_alerta:"roja" },

      { num:"Art. 17 LORPM / Art. 520 LECrim", nombre:"Detención de MENORES — Régimen especial (LO 5/2000)", tag:"clave", resumen:"La detención de menores de edad (14 a 17 años) tiene un régimen específico y más garantista que el de adultos: plazo máximo de 24 horas, notificación inmediata al MF y a los representantes legales, y condiciones especiales de custodia.", contenido:[
        {label:"Ámbito de aplicación",texto:"La LO 5/2000 (LORPM) se aplica a los mayores de 14 años y menores de 18 en el momento de cometer el hecho. Los menores de 14 años no son penalmente responsables (se activa protección civil/menores)."},
        {label:"Plazo máximo: 24 horas (art. 17.4 LORPM)",texto:"El menor detenido debe ser puesto en libertad o a disposición del Ministerio Fiscal (no del Juez, sino del FISCAL DE MENORES) dentro del plazo máximo de 24 horas. No hay prórroga posible salvo terrorismo."},
        {label:"Excepción terrorismo",texto:"Si el menor está implicado en delitos de terrorismo o banda armada → se aplica el art. 520 bis LECrim: el plazo puede alcanzar las 72 horas + 48 horas de prórroga judicial (120 horas), igual que los adultos."},
        {label:"Notificaciones INMEDIATAS obligatorias",lista:[
          "Al Ministerio Fiscal (sección de menores): siempre, de inmediato",
          "A los representantes legales del menor (padre/madre, tutor, guardador de hecho): inmediatamente",
          "Si es extranjero: también a las autoridades consulares de su país si reside fuera de España o si lo solicita",
        ]},
        {label:"Derechos del menor detenido",lista:[
          "Todos los del art. 520 LECrim (iguales que los adultos)",
          "Informarle en lenguaje CLARO y COMPRENSIBLE adaptado a su edad",
          "Derecho a entrevista reservada con abogado antes y después de la declaración",
          "Toda declaración: en presencia de su letrado Y de quien ejerza la patria potestad/tutela (salvo conflicto de intereses)",
          "Si hay conflicto de intereses con los padres: se nombra defensor judicial",
        ]},
        {label:"Condiciones de custodia (art. 17.3 LORPM)",lista:[
          "Dependencias ADECUADAS y SEPARADAS de las de adultos",
          "No puede compartir dependencias con detenidos mayores de edad en ningún caso",
          "Debe recibir cuidados, protección y asistencia social, psicológica, médica y física adecuada a su edad, sexo y características individuales",
        ]},
        {label:"¿Ante quién se pone al menor?",texto:"A disposición del MINISTERIO FISCAL (no del juez). Es el Fiscal de Menores quien instruye el expediente (no el Juez de Instrucción ordinario). El Juzgado de Menores adopta las medidas cautelares si el Fiscal lo solicita."},
        {label:"Habeas corpus del menor (art. 17.5 LORPM)",texto:"Si el propio menor solicita habeas corpus, la Policía debe notificarlo inmediatamente al Ministerio Fiscal, además de dar curso al procedimiento conforme a la LO 6/1984."},
      ], alerta:"CLAVE: al detener a un menor, la puesta a disposición es ante el FISCAL DE MENORES, no ante el Juez. El plazo es de 24 horas (no 72). Si no detectas la minoría de edad hasta después de la detención, comunica de inmediato al Fiscal y ajusta el plazo desde ese momento.", tipo_alerta:"roja" },
    ]
  },

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  {
    titulo:"LECrim — Art. 520: Derechos del detenido (Miranda español)", id:"art520",
    arts:[
      { num:"Art. 520 LECrim", nombre:"Derechos del detenido — Información y asistencia letrada", tag:"clave", resumen:"Toda persona detenida o presa tiene los siguientes derechos que deben ser informados de INMEDIATO, por escrito, en lenguaje comprensible. Su incumplimiento puede acarrear la nulidad de las diligencias.", contenido:[
        {label:"Derechos del art. 520.2 — deben informarse INMEDIATAMENTE",lista:[
          "a) Derecho a guardar silencio, no declarar si no quiere, no contestar a alguna/s pregunta/s o manifestar que solo declarará ante el juez",
          "b) Derecho a no declarar contra sí mismo y a no confesarse culpable",
          "c) Derecho a designar abogado y a ser asistido por él, incluso durante la declaración policial; si no designa, se nombrará de oficio",
          "d) Derecho a acceder a los elementos de las actuaciones que sean esenciales para impugnar la legalidad de la detención",
          "e) Derecho a que se ponga en conocimiento del familiar o persona que desee la detención y el lugar de custodia (salvo incomunicación judicial)",
          "f) Derecho a comunicarse telefónicamente, sin demora injustificada, con un tercero de su elección (salvo incomunicación)",
          "g) Derecho a ser asistido gratuitamente por un intérprete si no comprende o no habla castellano",
          "h) Derecho a ser reconocido por el médico forense o su sustituto legal y, en su defecto, por el de la institución donde se encuentre",
        ]},
        {label:"Art. 520.4 — Asistencia letrada IRRENUNCIABLE",texto:"El detenido no puede renunciar a la asistencia letrada. El abogado debe personarse en un plazo máximo de 8 horas desde que se solicita al Colegio de Abogados. La declaración sin abogado vulnera el art. 17.3 CE y puede anular la prueba (art. 11 LOPJ)."},
        {label:"Art. 520.6 — Funciones del abogado",lista:[
          "Solicitar información sobre los derechos del detenido y las razones de la detención",
          "Intervenir en las diligencias de declaración e inspección ocular",
          "Entrevistarse reservadamente con el detenido, incluso antes de la declaración",
          "Acceder a los elementos esenciales del atestado para impugnar la legalidad",
        ]},
        {label:"Art. 520.8 — Excepción (delitos de tráfico)",texto:"Única excepción a la irrenunciabilidad: el detenido puede renunciar a la asistencia letrada en diligencias de reconocimiento de identidad y de alcoholemia en delitos contra la seguridad del tráfico (art. 379 CP)."},
      ], alerta:"MNEMOTECNIA 'NARCISISTA': No declarar · Abogado · Reconocimiento médico · Comunicar detención · Intérprete · Silencio · Traductores · Acceso atestado. El incumplimiento de cualquiera puede acarrear nulidad de pleno derecho (art. 11 LOPJ).", tipo_alerta:"roja" },

      { num:"Art. 520 bis", nombre:"Detención en delitos de terrorismo — Prórroga e incomunicación", tag:"detenc", resumen:"En delitos de terrorismo, el régimen de detención es especial: pueden ampliarse los plazos y acordarse la incomunicación.", contenido:[
        {label:"Prórroga",texto:"El juez puede acordar una prórroga de la detención de hasta 48 horas adicionales a las 72h ordinarias → máximo total: 120 horas (5 días)."},
        {label:"Incomunicación",texto:"El juez puede acordar la incomunicación del detenido. Durante la incomunicación: el abogado lo asigna el Estado (no hay libre designación), se puede suspender el derecho a comunicar la detención al familiar, y se puede suspender el acceso al atestado."},
        {label:"Tramitación",texto:"La solicitud de prórroga o incomunicación la hace la Policía al juez competente. El juez resuelve en 24 horas mediante auto motivado."},
      ], alerta:"La incomunicación solo la puede acordar el juez. La Policía puede solicitar pero NUNCA acordar por sí sola la incomunicación.", tipo_alerta:"roja" },
    ]
  },

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  {
    titulo:"Habeas Corpus — LO 6/1984", id:"habeascorpus",
    arts:[
      { num:"LO 6/1984 — Arts. 1-9", nombre:"Procedimiento de Habeas Corpus", tag:"clave", resumen:"Mecanismo constitucional (art. 17.4 CE) para obtener la inmediata puesta a disposición judicial de toda persona detenida ilegalmente. Es la garantía más rápida contra la detención ilegal.", contenido:[
        {label:"¿Cuándo procede el Habeas Corpus? (Art. 1 LOHC)",lista:[
          "Detenidos ilegalmente por no darse los supuestos legales o no respetarse los requisitos formales",
          "Detenidos en lugar no destinado legalmente a la detención (no en comisaría ni CIE)",
          "Detenidos por plazo superior al señalado en las leyes (más de 72h ordinarias sin disposición judicial)",
          "Detenidos a quienes no se respeten los derechos del art. 520 LECrim (no se les informa de derechos, no se les da abogado, etc.)",
          "Los internados en centros de internamiento (incluido CIE) ilegalmente",
        ]},
        {label:"¿Quién puede solicitarlo? (Art. 3 LOHC)",lista:[
          "El propio detenido",
          "Su cónyuge o persona unida por análoga relación de afectividad",
          "Descendientes, ascendientes, hermanos",
          "El Ministerio Fiscal",
          "El Defensor del Pueblo",
          "El juez de oficio (puede iniciarlo él mismo)",
          "NO necesita abogado ni procurador para la solicitud",
        ]},
        {label:"¿Ante quién se solicita? (Art. 2 LOHC)",lista:[
          "Juez de Instrucción del lugar donde se encuentre el detenido",
          "Si está en dependencias policiales: ante el Juez de Instrucción de guardia de esa localidad",
          "Si es detenido por orden judicial: ante el juez o tribunal que ordenó la detención",
        ]},
        {label:"Procedimiento (Arts. 6-8 LOHC)",lista:[
          "1. Se presenta la solicitud (oral o escrita, sin abogado ni procurador)",
          "2. El juez examina la solicitud y, si la admite, dicta auto de incoación",
          "3. Se notifica inmediatamente a quien tenga al detenido bajo su custodia",
          "4. El custodio debe presentar al detenido ante el juez en el plazo señalado",
          "5. El juez oye al detenido, al Ministerio Fiscal y a quien ordenó la detención",
          "6. En el plazo de 24 horas dicta auto: ordenando la puesta en libertad, el mantenimiento de la detención o el traslado a establecimiento adecuado",
        ]},
        {label:"Efectos del auto estimatorio",lista:[
          "Puesta inmediata en libertad del detenido ilegalmente",
          "O traslado al establecimiento adecuado si la privación de libertad fue legal pero el lugar no lo era",
          "O regularización de las condiciones de la detención",
        ]},
      ], alerta:"OBLIGACIÓN POLICIAL: cuando el agente custodia a un detenido y recibe notificación de incoación de habeas corpus, tiene obligación inmediata de presentar al detenido ante el juez. Resistirse o demorar equivale a desobediencia judicial y puede agravar la ilegalidad.", tipo_alerta:"roja" },
    ]
  },

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  {
    titulo:"LECrim — Entrada y registro en domicilio (Arts. 545–569)", id:"entradaregistro",
    arts:[
      { num:"Arts. 545-546", nombre:"Inviolabilidad del domicilio — Regla general", tag:"clave", resumen:"Nadie puede entrar en el domicilio de un español o extranjero residente en España sin su consentimiento, salvo en los tres supuestos legales.", contenido:[
        {label:"Art. 545 — Regla",texto:"Nadie podrá entrar en el domicilio de un español o extranjero residente en España sin su consentimiento, excepto en los casos y en la forma expresamente previstos en las leyes."},
        {label:"Art. 18.2 CE — Los 3 supuestos que habilitan la entrada",lista:[
          "1. CONSENTIMIENTO del titular del domicilio (art. 551 LECrim)",
          "2. RESOLUCIÓN JUDICIAL (auto motivado del juez — art. 550 LECrim)",
          "3. DELITO FLAGRANTE (art. 553 LECrim)",
        ]},
        {label:"Art. 546 — Autoridad competente",texto:"El juez o tribunal que conociere de la causa puede decretar la entrada y registro, de día o de noche, en edificios y lugares públicos cuando hubiere indicios de encontrarse allí el investigado o efectos/instrumentos del delito."},
      ], alerta:"Fuera de estos tres supuestos, la entrada en domicilio es ilícita y vulnera el art. 18.2 CE. Las pruebas obtenidas en entrada ilícita son nulas (art. 11.1 LOPJ: prueba de árbol envenenado).", tipo_alerta:"roja" },

      { num:"Art. 550", nombre:"Autorización judicial — Auto de entrada y registro", tag:"clave", resumen:"El juez instructor puede autorizar la entrada y registro en domicilio particular mediante auto motivado, de día o de noche si hay urgencia.", contenido:[
        {label:"Requisitos del auto",lista:[
          "Auto fundado y motivado (no basta orden verbal)",
          "Debe indicar: el edificio o lugar concreto, si se practica de día o de noche, las personas que intervienen",
          "Se notifica al interesado inmediatamente o a más tardar en 24 horas",
        ]},
        {label:"Competencia",texto:"Juez de Instrucción del partido judicial donde se cometió el delito (arts. 14 y 550 LECrim). Para delitos de la Audiencia Nacional: Juzgado Central de Instrucción."},
        {label:"Consentimiento con detenido (OJO)",texto:"Si el titular está detenido, el consentimiento para la entrada debe darse con asistencia letrada presente. Sin abogado, el consentimiento del detenido es inválido (STS)."},
      ], alerta:"La Policía no puede entrar en un domicilio por su propia autoridad salvo flagrante delito. Si no hay flagrancia ni consentimiento válido → SIEMPRE necesita auto judicial previo.", tipo_alerta:"roja" },

      { num:"Art. 551", nombre:"Consentimiento del morador", tag:"", resumen:"El titular del domicilio puede consentir la entrada. El consentimiento debe ser libre, informado y expreso.", contenido:[
        {label:"Requisitos",lista:[
          "Debe ser el titular del derecho a la intimidad del domicilio (no vale el consentimiento de un empleado o visita)",
          "Debe ser libre (sin coacciones ni presiones)",
          "Si hay varios moradores con intereses contrapuestos: el consentimiento de uno no es suficiente frente al otro",
          "Si el titular está detenido: el consentimiento requiere asistencia letrada",
        ]},
        {label:"Resistencia",texto:"Art. 551: la resistencia del interesado o su familia a presenciar el registro produce la responsabilidad del delito de desobediencia grave (art. 556 CP), pero no impide que la diligencia se practique si hay autorización judicial."},
      ], alerta:"", tipo_alerta:"" },

      { num:"Art. 553", nombre:"Entrada en flagrante delito — Sin autorización judicial", tag:"detenc", resumen:"Única excepción policial autónoma: en caso de delito flagrante, los agentes pueden entrar en un domicilio sin consentimiento ni autorización judicial.", contenido:[
        {label:"Supuestos del art. 553",lista:[
          "Delito flagrante: el agente presencia la comisión del delito en el interior del domicilio o tiene constancia inmediata de ello",
          "Persecución de delincuente en flagrancia que se introduce en un domicilio",
          "Cuando el delincuente, inmediatamente antes de la entrada, ha cometido un delito grave",
        ]},
        {label:"¿Qué es flagrante?",texto:"El TC exige tres elementos: (1) actualidad del delito (se está cometiendo o se acaba de cometer), (2) evidencia del delito (prueba directa, no sospecha), (3) urgencia de la intervención (no hay tiempo para obtener autorización judicial)."},
        {label:"Consecuencias",lista:[
          "La Policía puede entrar, detener al autor y recoger los efectos del delito",
          "Debe dar cuenta inmediata al juez competente",
          "Se levantará acta detallada de la entrada, la hora, lo encontrado y los agentes participantes",
        ]},
      ], alerta:"La flagrancia no puede presumirse ni forzarse. Provocar una situación para justificar la entrada (ej: escuchar ruidos sin más) no es suficiente. La flagrancia debe ser real y objetiva. Si el juez aprecia que no había flagrancia → prueba nula.", tipo_alerta:"roja" },

      { num:"Arts. 558-569", nombre:"Desarrollo del registro — Formalidades", tag:"", resumen:"El registro debe practicarse con una serie de garantías formales cuyo incumplimiento puede nulificar la diligencia.", contenido:[
        {label:"Presencia obligatoria",lista:[
          "El secretario judicial (o Letrado de la Administración de Justicia) — aunque en la práctica policial actúa como fedatario el agente instructor",
          "El interesado o su representante (si no quiere estar: un familiar mayor de edad o, en su defecto, dos vecinos)",
          "En caso de que no se halle a nadie: acta con dos testigos que firmen",
        ]},
        {label:"Horario",texto:"De día (6:00–22:00) como regla general. De noche solo si el auto judicial lo autoriza expresamente o si el registro iniciado de día no ha terminado (previa autorización del interesado)."},
        {label:"Acta del registro (art. 572)",texto:"Debe consignar: juez o agente que lo practica, personas que intervienen, hora de inicio y fin, relación ordenada de lo registrado, incidencias. Es la base del atestado."},
        {label:"Recogida de efectos",texto:"Los efectos encontrados se recogen, inventarían y depositan. No pueden utilizarse sin autorización judicial como prueba independiente al atestado."},
      ], alerta:"Un registro practicado sin las formalidades esenciales (presencia del interesado o testigos, acta, horario sin autorización nocturna) puede ser declarado nulo por el tribunal.", tipo_alerta:"" },
    ]
  },

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  {

    arts:[
      { num:"Arts. 503-504", nombre:"Requisitos y duración de la prisión provisional", tag:"clave", resumen:"La prisión provisional es la medida más grave antes de condena. Solo el juez puede acordarla. Tiene requisitos estrictos y plazos máximos.", contenido:[
        {label:"Requisitos (art. 503)",lista:[
          "1. Que conste en la causa la existencia de uno o varios hechos que presenten caracteres de delito sancionado con pena cuyo máximo sea igual o superior a dos años de prisión (o inferior si el imputado tiene antecedentes no cancelados)",
          "2. Que aparezcan en la causa motivos bastantes para creer responsable criminalmente del delito a la persona contra quien se haya de dictar el auto de prisión",
          "3. Que mediante la prisión provisional se persiga alguno de los siguientes fines: (a) asegurar la presencia del investigado, (b) evitar la ocultación/alteración de pruebas, (c) evitar que el imputado actúe contra bienes de la víctima, (d) evitar el riesgo de reiteración delictiva",
        ]},
        {label:"Plazos máximos (art. 504)",tabla:[
          ["Tipo de delito / fase","Plazo máximo"],
          ["Delito con pena ≤3 años","1 año (prorrogable 6 meses más si hay sentencia condenatoria)"],
          ["Delito con pena >3 años","2 años (prorrogable 2 años más si hay sentencia condenatoria)"],
          ["Pena grave (>6 años) — casos excepcionales","Hasta 4 años totales"],
        ]},
      ], alerta:"La prisión provisional NO es una pena. Es medida cautelar. El tiempo en prisión preventiva computa en el cumplimiento de la futura pena (art. 58 CP — abono de prisión preventiva).", tipo_alerta:"" },

      { num:"Art. 505", nombre:"Audiencia para acordar prisión provisional", tag:"", resumen:"Antes de acordar la prisión provisional, el juez debe celebrar una audiencia con el fiscal, el detenido y su abogado.", contenido:[
        {label:"Procedimiento",lista:[
          "El juez convoca audiencia en el plazo de 72 horas desde la puesta a disposición",
          "El fiscal puede solicitar prisión provisional, libertad provisional con cargos o libertad sin cargos",
          "El imputado y su abogado pueden alegar y proponer prueba",
          "El juez resuelve mediante auto motivado",
        ]},
      ], alerta:"", tipo_alerta:"" },

      { num:"Art. 509", nombre:"Incomunicación del preso preventivo", tag:"detenc", resumen:"En casos excepcionales (terrorismo, crimen organizado) el juez puede acordar la incomunicación del preso preventivo.", contenido:[
        {label:"Supuestos",lista:[
          "Necesidad urgente de evitar que el preso comunique con otros partícipes aún no detenidos",
          "O necesidad de evitar que se destruyan pruebas o efectos del delito",
        ]},
        {label:"Duración",texto:"El auto de incomunicación se dicta por un plazo de hasta 5 días. Prorrogable por otros 5 días en casos de terrorismo."},
        {label:"Derechos suspendidos durante incomunicación",lista:[
          "Libre designación de abogado (se asigna de oficio, sin que el detenido pueda elegir)",
          "Derecho a comunicar la detención al familiar",
          "Entrevista reservada con el abogado (previa y posterior a la declaración)",
        ]},
      ], alerta:"La incomunicación solo la acuerda el juez mediante auto motivado. La Policía no puede acordarla autónomamente.", tipo_alerta:"roja" },
    ]
  },

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  {
    titulo:"LECrim — Medidas de investigación tecnológica (Arts. 588 bis y ss.)", id:"investigacion",
    arts:[
      { num:"Arts. 588 bis a – 588 ter", nombre:"Intervención de comunicaciones telefónicas y telemáticas", tag:"clave", resumen:"La intervención de las comunicaciones (teléfono, email, WhatsApp...) requiere siempre autorización judicial previa mediante auto motivado.", contenido:[
        {label:"Requisitos",lista:[
          "Auto judicial motivado (nunca puede acordarlo la Policía por sí sola)",
          "Que conste la existencia de delito grave o delito menos grave cometido por organización criminal",
          "Proporcionalidad: la medida debe ser necesaria y no existir alternativa menos lesiva",
          "Plazo máximo: 3 meses, prorrogables hasta 18 meses en total",
        ]},
        {label:"¿Qué cubre?",lista:[
          "Comunicaciones telefónicas (voz, SMS)",
          "Comunicaciones telemáticas (email, WhatsApp, Telegram, redes sociales...)",
          "Datos externos de las comunicaciones (metadatos: quién llamó a quién, cuándo, duración — art. 588 ter j)",
        ]},
        {label:"Resultado",texto:"Las grabaciones y capturas se aportan al atestado como prueba. Sin autorización judicial → prueba nula (art. 11 LOPJ)."},
      ], alerta:"La escucha o captura de comunicaciones sin autorización judicial es delito (art. 197 CP) incluso para agentes de policía.", tipo_alerta:"roja" },

      { num:"Arts. 588 quater – 588 sexies", nombre:"Captación de imagen, seguimiento y acceso a dispositivos", tag:"", resumen:"Otras medidas de investigación tecnológica que también requieren autorización judicial.", contenido:[
        {label:"Captación de imágenes en lugar público (art. 588 quater)",texto:"Se puede acordar la captación de imágenes de personas en espacios públicos sin autorización judicial si el lugar es de acceso público y la finalidad es la investigación de delitos graves. En espacios no públicos → siempre necesita autorización judicial."},
        {label:"Seguimiento y localización (art. 588 quinquies)",texto:"Los dispositivos de seguimiento y localización (GPS, balizas) en vehículos o lugares no domiciliarios: requieren autorización judicial. Plazo: 3 meses prorrogables."},
        {label:"Acceso remoto a equipos informáticos — hackeo legal (art. 588 sexies)",texto:"Solo para investigación de delitos graves. Requiere autorización judicial específica. Excepcionalmente urgente: Policía puede solicitarlo y actuar antes de recibir el auto, pero dando cuenta inmediata al juez."},
      ], alerta:"", tipo_alerta:"" },
    ]
  },

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  {
    titulo:"Competencia judicial — LECrim y LOPJ", id:"competencia",
    arts:[
      { num:"Arts. 14-15 LECrim", nombre:"Juez competente según el delito y la fase", tag:"clave", resumen:"La competencia judicial varía según la gravedad del delito, la fase procesal y la materia.", contenido:[
        {label:"Fase de instrucción (investigación)",tabla:[
          ["Tipo de delito","Órgano competente"],
          ["Delitos menos graves y leves — ámbito ordinario","Juzgado de Instrucción del partido judicial donde se cometió el delito"],
          ["Delitos graves — ámbito ordinario","Juzgado de Instrucción (instrucción) → Audiencia Provincial (enjuiciamiento)"],
          ["Delitos de terrorismo, crimen organizado, narcotráfico a gran escala","Juzgado Central de Instrucción (Audiencia Nacional)"],
          ["Delitos de menores","Juzgado de Menores (Fiscalía de Menores dirige la instrucción)"],
          ["Delitos cometidos por aforados (diputados, senadores, jueces del TS...)","Tribunal Supremo o Tribunal Superior de Justicia según el caso"],
        ]},
        {label:"Juzgado de guardia",texto:"Conoce de todos los asuntos urgentes fuera del horario ordinario: control de detenciones, habeas corpus, medidas cautelares urgentes, enjuiciamiento de delitos leves en juicio inmediato."},
      ], alerta:"La Policía Judicial pone al detenido a disposición del juez competente. Si hay duda, se acude al Juzgado de guardia del lugar de la detención.", tipo_alerta:"" },

      { num:"LOPJ Arts. 87-87 ter", nombre:"Juzgados de Violencia sobre la Mujer (JVM)", tag:"clave", resumen:"Los Juzgados de Violencia sobre la Mujer son competentes para instruir todos los delitos de violencia de género. Es un error frecuente presentar estas denuncias ante el Juzgado de Instrucción ordinario.", contenido:[
        {label:"Competencia",lista:[
          "Instrucción de delitos de homicidio, lesiones, malos tratos, detención ilegal, amenazas, coacciones, acoso, agresión sexual... cuando se cometen sobre la pareja o expareja de género femenino",
          "También medidas civiles urgentes (guarda, custodia, alimentos...) si hay procedimiento penal en curso",
        ]},
        {label:"Si no hay JVM en el partido judicial",texto:"Competencia recae en el Juzgado de Instrucción de guardia, que ejerce las funciones del JVM."},
      ], alerta:"Presentar una denuncia por VG ante el órgano equivocado no invalida la denuncia, pero genera dilaciones. Siempre al JVM o Juzgado de guardia con competencia VG.", tipo_alerta:"" },

      { num:"LOPJ Arts. 64-69", nombre:"Audiencia Nacional — Competencia exclusiva", tag:"", resumen:"La Audiencia Nacional conoce de delitos especialmente graves de alcance nacional o internacional.", contenido:[
        {label:"Delitos de competencia de la AN",lista:[
          "Terrorismo y sus formas conexas",
          "Tráfico de drogas a gran escala (de notoria importancia) cuando el hecho sea de especial trascendencia",
          "Crimen organizado en el ámbito nacional o internacional",
          "Delitos monetarios y de fraude masivo",
          "Falsificación de moneda",
          "Delitos contra el titular de la Corona, su heredero y altos cargos del Estado",
          "Piratería y delitos en alta mar",
        ]},
        {label:"Instrucción",texto:"Juzgados Centrales de Instrucción (con sede en Madrid). Son los jueces competentes para autorizar intervenciones telefónicas, entradas y registros en estos delitos."},
      ], alerta:"En operaciones contra el terrorismo o el narcotráfico a gran escala, el interlocutor judicial es SIEMPRE el Juzgado Central de Instrucción, no el Juzgado de Instrucción territorial.", tipo_alerta:"" },

      { num:"LOPJ Art. 282 — Policía Judicial", nombre:"Policía Judicial — Definición y funciones", tag:"clave", resumen:"La LOPJ define qué es la Policía Judicial y cuáles son sus funciones en relación con los juzgados y tribunales.", contenido:[
        {label:"Art. 282 LECrim — Funciones de la Policía Judicial",lista:[
          "Averiguar los delitos públicos que se cometieren en su territorio o demarcación",
          "Practicar las diligencias necesarias para comprobarlos y descubrir a los delincuentes",
          "Recoger todos los efectos, instrumentos o pruebas del delito",
          "Poner a disposición judicial a los detenidos",
          "Elaborar el atestado policial y remitirlo al juzgado competente",
        ]},
        {label:"Dependencia funcional",texto:"La Policía Judicial depende funcionalmente del juez instructor o del Ministerio Fiscal durante la investigación. Operativamente depende del Ministerio del Interior (o CCAA con policía propia)."},
        {label:"Policía Judicial 'específica'",texto:"La UDYCO, UDEF, UCO, equipos especializados adscritos a juzgados y tribunales. Su relación con el órgano judicial es más estrecha y directa."},
      ], alerta:"Las diligencias que practica la Policía Judicial forman el atestado (arts. 292-298 LECrim), que tiene valor de denuncia, no de prueba plena. La prueba se practica en el juicio oral.", tipo_alerta:"" },
    ]
  },

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  {
    titulo:"LECrim Título III — Policía Judicial (Arts. 282–298)", id:"policiajudicial",
    arts:[
      { num:"Art. 282", nombre:"Objeto y obligaciones de la Policía Judicial", tag:"clave", resumen:"Define qué es la Policía Judicial y cuáles son sus obligaciones esenciales. Es el artículo fundacional de la actuación policial en el proceso penal.", contenido:[
        {label:"Texto del artículo",texto:"La Policía Judicial tiene por objeto y será obligación de todos los que la componen: averiguar los delitos públicos que se cometieren en su territorio o demarcación; practicar, según sus atribuciones, las diligencias necesarias para comprobarlos y descubrir a los delincuentes; y recoger todos los efectos, instrumentos o pruebas del delito de cuya desaparición hubiere peligro, poniéndolos a disposición de la autoridad judicial."},
        {label:"Obligación con las víctimas",texto:"Cuando las víctimas entren en contacto con la Policía Judicial, ésta cumplirá con los deberes de información previstos en la legislación vigente (Estatuto de la Víctima — LO 4/2015)."},
        {label:"Marco normativo completo",lista:[
          "Art. 126 CE — Dependencia funcional de jueces y MF",
          "Arts. 547-550 LOPJ — Regulación orgánica de la Policía Judicial",
          "Arts. 282-298 LECrim — Regulación procesal (este Título)",
          "RD 769/1987 — Reglamento de la Policía Judicial",
          "LO 2/1986 — Fuerzas y Cuerpos de Seguridad del Estado",
        ]},
      ], alerta:"La Policía Judicial actúa bajo la dependencia funcional de jueces y fiscales durante la investigación, aunque orgánicamente dependa del Ministerio del Interior. Esta doble dependencia es la clave de su posición institucional.", tipo_alerta:"" },

      { num:"Art. 282 bis", nombre:"Agente encubierto — Infiltración policial", tag:"clave", resumen:"Regula la figura del agente encubierto: el funcionario de Policía Judicial que actúa bajo identidad falsa para investigar organizaciones criminales. Requiere siempre autorización judicial o del Ministerio Fiscal.", contenido:[
        {label:"Autorización (ap. 1)",texto:"El juez de instrucción o el Ministerio Fiscal pueden autorizar a funcionarios de la PJ a actuar bajo identidad supuesta (nombre falso) y adquirir y transportar objetos del delito, diferir la incautación e intervenir en sus transacciones."},
        {label:"Delitos en que procede (ap. 4)",lista:[
          "Delincuencia organizada (≥3 personas, estructura estable)",
          "Terrorismo",
          "Tráfico de drogas",
          "Tráfico de armas, explosivos, materiales nucleares",
          "Tráfico de personas / trata de seres humanos",
          "Blanqueo de capitales",
          "Delitos contra la Hacienda Pública y Seguridad Social",
          "Corrupción entre particulares y delitos de cohecho",
          "Delitos de pornografía infantil",
          "Delitos informáticos graves (art. 588 ter a)",
        ]},
        {label:"Irrenunciabilidad (ap. 2)",texto:"Ningún funcionario de la Policía Judicial podrá ser OBLIGADO a actuar como agente encubierto. Es voluntario."},
        {label:"Exención de responsabilidad (ap. 5)",texto:"El agente encubierto está EXENTO de responsabilidad criminal por las actuaciones consecuencia necesaria del desarrollo de la investigación, siempre que sean proporcionales y NO constituyan una PROVOCACIÓN al delito (prohibición del delito provocado)."},
        {label:"Límite clave: prohibición de provocación",texto:"Si el agente encubierto INDUCE a cometer el delito a quien no lo habría cometido de otro modo → el delito es PROVOCADO → es nulo y el agente puede incurrir en responsabilidad penal."},
        {label:"Agente encubierto informático (ap. 6-7)",texto:"Puede actuar en canales cerrados de comunicación y plataformas de internet bajo identidad falsa. El juez puede autorizar captación de imágenes y grabación de conversaciones incluso en domicilio durante estas investigaciones."},
        {label:"Deber de información",texto:"La información obtenida debe ponerse a la mayor brevedad en conocimiento del autorizante. Todo lo obtenido se aporta íntegramente al proceso."},
      ], alerta:"El delito PROVOCADO invalida la investigación completa. La línea entre infiltración legítima y provocación es la que distingue si el investigado ya tenía predisposición a delinquir o si fue el agente quien la generó.", tipo_alerta:"roja" },

      { num:"Art. 283", nombre:"Integrantes de la Policía Judicial", tag:"", resumen:"Quiénes componen la Policía Judicial según la LECrim. Es una enumeración amplia que va más allá de CNP y GC.", contenido:[
        {label:"Integrantes (art. 283)",lista:[
          "Las autoridades administrativas encargadas de la seguridad pública y la persecución de delitos",
          "Los empleados o subalternos de la policía de seguridad (cualquier denominación)",
          "Los alcaldes, tenientes de alcalde y alcaldes de barrio",
          "Los Jefes, oficiales e individuos de la Guardia Civil o cualquier otra fuerza de persecución del delito",
          "Los Jefes, inspectores y agentes de la Policía judicial (CNP en términos actuales)",
          "Los funcionarios del Cuerpo especial de Prisiones",
          "Los agentes judiciales y los subalternos de los Tribunales y Juzgados",
          "El personal dependiente de los Jueces de paz en los pueblos",
        ]},
        {label:"Policía Judicial 'específica' (LOPJ arts. 547-550)",texto:"Unidades adscritas orgánicamente a juzgados y tribunales (UCO, UDYCO, UDEF...). Tienen relación más directa y estable con el órgano judicial. El juez puede impartirles instrucciones directas para diligencias concretas."},
      ], alerta:"Las policías autonómicas (Mossos, Ertzaintza, Policía Foral, Policía de Canarias) también ejercen funciones de Policía Judicial en sus ámbitos territoriales respectivos.", tipo_alerta:"" },

      { num:"Art. 284", nombre:"Comunicación inmediata a la autoridad judicial y al MF", tag:"clave", resumen:"En cuanto la Policía Judicial tenga noticia de un delito público, debe comunicarlo de inmediato al juez y al Ministerio Fiscal mediante el atestado, sin cesar en las diligencias de prevención.", contenido:[
        {label:"Regla",texto:"Inmediatamente que los funcionarios de la PJ tuvieren conocimiento de un delito público, o fueren requeridos para prevenir la instrucción de diligencias por razón de delito privado, lo participarán a la Autoridad judicial o al representante del MF, si pudieren hacerlo sin cesar en la práctica de las diligencias de prevención. En otro caso, lo harán cuando las hubieren terminado."},
        {label:"Urgencia vs. comunicación",texto:"La prioridad es asegurar la escena, recoger pruebas y detener al autor si procede. La comunicación al juzgado se hace en paralelo o inmediatamente después. En ningún caso puede demorarse injustificadamente."},
        {label:"Plazo",texto:"Art. 295 LECrim: no podrán transcurrir más de 24 horas sin dar conocimiento a la autoridad judicial de las diligencias practicadas, salvo fuerza mayor."},
      ], alerta:"El atestado se remite al juzgado en el plazo de 24 horas. Si hay detenido, se entrega junto con el detenido (que a su vez debe ponerse a disposición judicial en 72h máximo).", tipo_alerta:"roja" },

      { num:"Arts. 285-286", nombre:"Relación entre la Policía Judicial y el juez instructor", tag:"", resumen:"Regula cómo la Policía Judicial cesa sus diligencias en cuanto el juez instructor se persona, y le entrega todo lo actuado.", contenido:[
        {label:"Art. 285 — Órdenes del MF",texto:"Los funcionarios de la PJ practicarán sin dilación, según sus atribuciones, las diligencias que el Ministerio Fiscal les encomiende para la comprobación del delito y averiguación de los delincuentes, y todas las que los jueces de instrucción les encarguen durante el curso de la causa."},
        {label:"Art. 286 — Cese al personarse el juez",texto:"Cuando el Juez de instrucción se presente a formar el sumario, cesarán las diligencias de prevención que estuviere practicando cualquier autoridad o agente de policía; debiendo éstos entregarlas en el acto al juez, así como los efectos relativos al delito recogidos, y poniendo a su disposición a los detenidos si los hubiere."},
        {label:"Implicación práctica",texto:"Hasta que el juez tome el mando de la investigación, la Policía actúa autónomamente (diligencias de prevención). Desde que el juez se persona, toda diligencia debe contar con su autorización o encomienda."},
      ], alerta:"Una vez el juez asume la instrucción, la Policía Judicial pasa a ser auxiliar: ejecuta lo que el juez ordena, no actúa motu proprio.", tipo_alerta:"" },

      { num:"Arts. 287-290", nombre:"Relaciones funcionales entre Policía Judicial y jueces/MF", tag:"", resumen:"El juez y el MF pueden dirigirse directamente a cualquier funcionario de la PJ, de cualquier categoría, para todos los efectos del Título III.", contenido:[
        {label:"Art. 287 — Diligencias del MF",texto:"Los funcionarios de la PJ practicarán sin dilación las diligencias que el MF les encomiende para la comprobación del delito y averiguación de los delincuentes."},
        {label:"Art. 288 — Comunicación directa",texto:"El MF, los Jueces de instrucción y los municipales podrán entenderse directamente con los funcionarios de PJ, cualquiera que sea su categoría, para todos los efectos de este Título."},
        {label:"Art. 289 — Imposibilidad de cumplimiento",texto:"Si el funcionario de PJ no puede cumplir el requerimiento del juez o MF, debe comunicar inmediatamente la imposibilidad y sus causas."},
        {label:"Art. 290 — Tramitación urgente",texto:"Los requerimientos judiciales a la PJ se tramitarán con carácter urgente y preferente sobre cualquier otro asunto."},
      ], alerta:"", tipo_alerta:"" },

      { num:"Arts. 291-295", nombre:"Diligencias de prevención — Qué puede hacer la PJ autónomamente", tag:"clave", resumen:"Son las diligencias que la Policía Judicial puede practicar por iniciativa propia antes de que el juez tome el mando. Son la médula del trabajo policial en la fase inicial.", contenido:[
        {label:"Art. 291 — Diligencias de prevención",texto:"Los funcionarios de PJ formarán, con los detenidos, si los hubiere, y con los efectos o instrumentos del delito, las primeras diligencias y las pondrán a disposición del juez de instrucción."},
        {label:"Art. 292 — Contenido de las primeras diligencias",lista:[
          "Hacer constar la naturaleza y circunstancias del hecho",
          "Identificar a los autores y partícipes",
          "Consignar las declaraciones e informes recibidos",
          "Consignar las diligencias practicadas (inspección ocular, recogida de efectos...)",
          "Acompañar documentación fotográfica o audiovisual cuando sea pertinente",
          "Recoger y custodiar los efectos, instrumentos o pruebas del delito",
        ]},
        {label:"Art. 293 — Levantamiento del cadáver",texto:"En caso de muerte violenta o sospechosa, la PJ debe comunicar el hecho inmediatamente al juez y, entre tanto, proteger el lugar, impedir que se altere la escena, y recoger todos los objetos que puedan servir para la investigación."},
        {label:"Art. 295 — Plazo máximo",texto:"No podrán transcurrir más de 24 horas sin dar conocimiento a la autoridad judicial de las diligencias practicadas y de su resultado, SALVO en los casos de fuerza mayor."},
      ], alerta:"Las 'primeras diligencias' (art. 292) son la base del atestado. Su correcta documentación es esencial: una escena mal preservada o una diligencia mal documentada puede arruinar toda la investigación posterior.", tipo_alerta:"roja" },

      { num:"Arts. 296-298", nombre:"El Atestado — Naturaleza y valor probatorio", tag:"clave", resumen:"El atestado es la documentación formal de todas las diligencias de la Policía Judicial. Tiene valor de denuncia, no de prueba plena.", contenido:[
        {label:"Art. 296 — El atestado como denuncia",texto:"La Policía Judicial remitirá con el atestado un informe dando cuenta del resultado de las investigaciones practicadas y de las diligencias ejecutadas para la comprobación del delito y la averiguación de sus autores."},
        {label:"Art. 297 — Valor de denuncia",texto:"Los atestados que redactare y las manifestaciones que hiciere la Policía Judicial, a consecuencia de las averiguaciones que hubiese practicado, se considerarán denuncias para los efectos legales. Las declaraciones que prestare el procesado ante la Policía Judicial solo tendrán el valor de denuncias; no podrán ser utilizadas contra el procesado sin que hayan sido ratificadas ante el juez instructor."},
        {label:"Art. 298 — Firma del atestado",texto:"Los funcionarios de PJ extenderán, bien en papel sellado, bien en papel común, los atestados que redactaren, los cuales firmará el que le hubiere instruido, y rubricarán todos los que en él hubieren intervenido."},
        {label:"Implicación fundamental",texto:"El atestado NO es prueba directa. Para que lo declarado en él tenga valor probatorio, debe: (1) ratificarse ante el juez de instrucción, o (2) introducirse en el juicio oral mediante la declaración testifical del agente que levantó el atestado."},
      ], alerta:"Una declaración policial tomada sin asistencia letrada al detenido es NULA aunque esté en el atestado. El atestado puede ser perfecto formalmente y contener prueba nula si se vulneraron los derechos del art. 520 LECrim.", tipo_alerta:"roja" },
    ]
  },

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  {
    titulo:"El Atestado Policial (Arts. 292–298 LECrim)", id:"atestado",
    arts:[
      { num:"Arts. 292-298 LECrim", nombre:"El Atestado — Concepto, estructura y valor probatorio", tag:"clave", resumen:"El atestado es el documento oficial en que la Policía Judicial hace constar todas las diligencias practicadas durante la investigación. Tiene valor de denuncia, no de prueba plena.", contenido:[
        {label:"Contenido del atestado",lista:[
          "Identificación del instructor y secretario del atestado",
          "Relación de los hechos investigados con indicación de hora, lugar y circunstancias",
          "Diligencias de inspección ocular e identificación del lugar del hecho",
          "Diligencias de identificación del investigado / detenido",
          "Declaraciones de testigos y perjudicados",
          "Declaración del detenido (con asistencia letrada)",
          "Recogida e inventario de efectos e instrumentos del delito",
          "Informe forense si hay heridos o muertos",
          "Cualquier otra diligencia relevante para la investigación",
        ]},
        {label:"Valor probatorio",texto:"El atestado tiene valor de denuncia (art. 297 LECrim). Las declaraciones en él recogidas no son prueba plena; para serlo, deben ratificarse en el juicio oral. Excepción: la declaración policial que es luego ratificada en instrucción puede usarse para refrescar la memoria en juicio."},
        {label:"Remisión",texto:"El atestado se remite al juzgado competente dentro de las 24 horas siguientes a su conclusión (art. 284 LECrim). Si hay detenido, se entrega junto con el detenido."},
        {label:"Instructor del atestado",texto:"El agente que instruye el atestado es quien dirige la investigación en sede policial. No puede ser el mismo agente que practicó la detención si hay conflicto de intereses."},
      ], alerta:"Las declaraciones policiales de los detenidos sin asistencia letrada son NULAS y no pueden incorporarse al atestado como prueba.", tipo_alerta:"roja" },

// RENDER PROCESAL
// ═══════════════════════════════════════════════════════════════
function renderProcesal() {
  const nav=document.getElementById("nav-lp");
  if(!nav.dataset.built){
    let btns=`<button class="nav-btn active" onclick="filtrarLP('todos',this)">Todos</button>`;
    PROCESAL.forEach(g=>{ btns+=`<button class="nav-btn" onclick="filtrarLP('${g.id}',this)">${g.titulo.split("—")[0].trim().replace("LECrim ","").replace("Habeas Corpus","Habeas")}</button>`; });
    nav.innerHTML=btns; nav.dataset.built="1";
  }
  let totalArts=0; let html=""; let idx=0;
  for(const grupo of PROCESAL){
    if(filtroLP!=="todos"&&filtroLP!==grupo.id){idx+=grupo.arts.length;continue;}
    const artsFilt=grupo.arts.filter(a=>{
      if(!busqueda)return true;
      const q=busqueda.toLowerCase();
      return a.num.toLowerCase().includes(q)||a.nombre.toLowerCase().includes(q)||a.resumen.toLowerCase().includes(q)||
             a.contenido.some(c=>(c.texto||"").toLowerCase().includes(q)||(c.lista||[]).some(l=>l.toLowerCase().includes(q)));
    });
    if(!artsFilt.length){idx+=grupo.arts.length;continue;}
    totalArts+=artsFilt.length;
    html+=`<div class="titulo-sec" onclick="toggleGrupo('glp-${grupo.id}')"><h2>${grupo.titulo}</h2><div class="linea"></div><div class="t-icon">▼</div></div><div class="grupo-body" id="glp-${grupo.id}">${artsFilt.map(a=>renderArtCard(a,`alp-${idx++}`)).join("")}</div>`;
  }
  document.getElementById("contador").textContent=totalArts?`${totalArts} artículo${totalArts>1?"s":""}`:""  ;
  document.getElementById("contenido").innerHTML=totalArts?html:`<div class="sin-res"><div style="font-size:36px">🔍</div><p>Sin resultados</p></div>`;
}

let filtroLP="todos";
function filtrarLP(tid,btn){
  document.querySelectorAll("#nav-lp .nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  filtroLP=tid; renderProcesal();
}

let filtroLOSC = "todos";

function renderLOSC() {
  const nav = document.getElementById("nav-losc");
  if (!nav.dataset.built) {
    let btns = `<button class="nav-btn active" onclick="filtrarLOSC('todos',this)">Todos</button>`;
    LOSC.forEach(g => { btns += `<button class="nav-btn" onclick="filtrarLOSC('${g.id}',this)">${g.titulo.split("—")[0].trim()}</button>`; });
    nav.innerHTML = btns;
    nav.dataset.built = "1";
  }
  let totalArts = 0; let html = ""; let idx = 0;
  for (const grupo of LOSC) {
    if (filtroLOSC !== "todos" && filtroLOSC !== grupo.id) { idx += grupo.arts.length; continue; }
    const artsFilt = grupo.arts.filter(a => {
      if (!busqueda) return true;
      const q = busqueda.toLowerCase();
      return a.num.toLowerCase().includes(q) || a.nombre.toLowerCase().includes(q) || a.resumen.toLowerCase().includes(q) ||
             a.contenido.some(c => (c.texto||"").toLowerCase().includes(q) || (c.lista||[]).some(l => l.toLowerCase().includes(q)));
    });
    if (!artsFilt.length) { idx += grupo.arts.length; continue; }
    totalArts += artsFilt.length;
    html += `<div class="titulo-sec" onclick="toggleGrupo('glosc-${grupo.id}')"><h2>${grupo.titulo}</h2><div class="linea"></div><div class="t-icon">▼</div></div><div class="grupo-body" id="glosc-${grupo.id}">${artsFilt.map(a => renderArtCard(a, `alosc-${idx++}`)).join("")}</div>`;
  }
  document.getElementById("contador").textContent = totalArts ? `${totalArts} artículo${totalArts > 1 ? "s" : ""}` : "";
  document.getElementById("contenido").innerHTML = totalArts ? html : `<div class="sin-res"><div style="font-size:36px">🔍</div><p>Sin resultados</p></div>`;
}

function filtrarLOSC(tid, btn) {
  document.querySelectorAll("#nav-losc .nav-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filtroLOSC = tid; renderLOSC();
}

function switchLibro(libro) {
  libroActivo=libro;
  ["l1","l2","lp","losc"].forEach(id => {
    const tab = document.getElementById("tab-"+id);
    if (tab) tab.classList.toggle("active", libro===id);
  });
  document.getElementById("filtros-l2").classList.toggle("hidden",libro!=="l2");
  document.getElementById("nav-l1").classList.toggle("hidden",libro!=="l1");
  document.getElementById("nav-lp").classList.toggle("hidden",libro!=="lp");
  document.getElementById("nav-losc").classList.toggle("hidden",libro!=="losc");
  document.getElementById("leyenda-l2").classList.toggle("hidden",libro!=="l2");
  const placeholders={l1:"Buscar artículo CP...",l2:"Buscar delito, artículo...",lp:"Buscar LECrim...",losc:"Buscar LOSC, infracciones..."};
  document.getElementById("buscador").placeholder=placeholders[libro]||"Buscar...";
  busqueda=""; document.getElementById("buscador").value="";
  renderActivo();
}

function renderActivo(){
  if(libroActivo==="l2") renderLibro2();
  else if(libroActivo==="l1") renderLibro1();
  else if(libroActivo==="lp") renderProcesal();
  else renderLOSC();
}

const REF_STYLES = `
  .ref-cat { margin: 16px 0 8px; }
  .ref-cat-header { display:flex; align-items:center; gap:8px; }
  .ref-cat-ico { font-size:18px; }
  .ref-cat-titulo { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--azul-cl); }
  .ref-card { background:white; border-radius:10px; margin-bottom:7px; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:12px 14px; }
  .ref-nombre { font-size:14px; font-weight:600; color:var(--texto); margin-bottom:4px; }
  .ref-resumen { font-size:12px; color:var(--gris); line-height:1.5; margin-bottom:8px; }
  .ref-link { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:var(--azul-cl); text-decoration:none; padding:4px 10px; border:1px solid var(--azul-cl); border-radius:6px; }
  .ref-link:active { background:var(--azul-cl); color:white; }
  .ref-intro { background:var(--azul); color:var(--blanco); border-radius:10px; padding:14px; margin-bottom:12px; }
  .ref-intro h3 { font-size:13px; color:var(--oro); margin-bottom:6px; }
  .ref-intro p { font-size:12px; color:var(--gris); line-height:1.5; }
`;

function renderReferencias() {
  const cont = document.getElementById("contenido");
  let html = `<style>${REF_STYLES}</style>`;
  html += `<div class="ref-intro">
    <h3>📚 Normativa y fuentes utilizadas</h3>
    <p>Todas las leyes, reglamentos e instrucciones en los que se basa esta guía, con enlace directo al texto oficial en el BOE u organismo competente. Verificado a fecha junio 2026.</p>
  </div>`;
  REFERENCIAS.forEach(cat => {
    html += `<div class="ref-cat">
      <div class="ref-cat-header">
        <span class="ref-cat-ico">${cat.ico}</span>
        <span class="ref-cat-titulo">${cat.cat}</span>
      </div>`;
    cat.items.forEach(item => {
      html += `<div class="ref-card">
        <div class="ref-nombre">${item.titulo}</div>
        <div class="ref-resumen">${item.resumen}</div>
        <a class="ref-link" href="${item.url}" target="_blank">🔗 Ver texto oficial</a>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("contador").textContent = "";
  cont.innerHTML = html;
}

function switchLibro(libro) {
  libroActivo=libro;
  ["l1","l2","lp","losc","ref"].forEach(id => {
    const tab = document.getElementById("tab-"+id);
    if (tab) tab.classList.toggle("active", libro===id);
  });
  const isRef = libro==="ref";
  document.getElementById("filtros-l2").classList.toggle("hidden",libro!=="l2");
  document.getElementById("nav-l1").classList.toggle("hidden",libro!=="l1");
  document.getElementById("nav-lp").classList.toggle("hidden",libro!=="lp");
  document.getElementById("nav-losc").classList.toggle("hidden",libro!=="losc");
  document.getElementById("nav-ref").classList.toggle("hidden",true);
  document.getElementById("leyenda-l2").classList.toggle("hidden",libro!=="l2");
  document.getElementById("buscador").parentElement.style.display = isRef ? "none" : "";
  const placeholders={l1:"Buscar artículo CP...",l2:"Buscar delito, artículo...",lp:"Buscar LECrim...",losc:"Buscar LOSC, infracciones..."};
  document.getElementById("buscador").placeholder=placeholders[libro]||"Buscar...";
  busqueda=""; document.getElementById("buscador").value="";
  renderActivo();
}

function renderActivo(){
  if(libroActivo==="l2") renderLibro2();
  else if(libroActivo==="l1") renderLibro1();
  else if(libroActivo==="lp") renderProcesal();
  else if(libroActivo==="losc") renderLOSC();
  else renderReferencias();
}
